  // ============ SVG Filter for 飛白 (dry brush) effect ============
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', '0');
  svg.setAttribute('height', '0');
  svg.style.position = 'absolute';

  const filter = document.createElementNS(svgNS, 'filter');
  filter.setAttribute('id', 'brushFilter');
  filter.setAttribute('x', '-5%');
  filter.setAttribute('y', '-5%');
  filter.setAttribute('width', '110%');
  filter.setAttribute('height', '110%');

  // feTurbulence for noise texture
  const turbulence = document.createElementNS(svgNS, 'feTurbulence');
  turbulence.setAttribute('type', 'fractalNoise');
  turbulence.setAttribute('baseFrequency', '0.025 0.05');
  turbulence.setAttribute('numOctaves', '4');
  turbulence.setAttribute('seed', Math.floor(Math.random() * 100));
  turbulence.setAttribute('result', 'noise');

  const displace = document.createElementNS(svgNS, 'feDisplacementMap');
  displace.setAttribute('in', 'SourceGraphic');
  displace.setAttribute('in2', 'noise');
  displace.setAttribute('scale', '8');
  displace.setAttribute('xChannelSelector', 'R');
  displace.setAttribute('yChannelSelector', 'G');
  displace.setAttribute('result', 'displaced');

  // Erode edges slightly for dry brush effect
  const erode = document.createElementNS(svgNS, 'feMorphology');
  erode.setAttribute('operator', 'erode');
  erode.setAttribute('radius', '0.5');
  erode.setAttribute('in', 'displaced');
  erode.setAttribute('result', 'eroded');

  // Dilate back slightly for rough edges
  const dilate = document.createElementNS(svgNS, 'feMorphology');
  dilate.setAttribute('operator', 'dilate');
  dilate.setAttribute('radius', '0.8');
  dilate.setAttribute('in', 'eroded');

  displace2.setAttribute('xChannelSelector', 'R');
  displace2.setAttribute('yChannelSelector', 'G');

  // ============ State ============
  let currentEp = null;
  let isAnimating = false;
  let db = null;
  let lastViewedIndex = -1;

  // ============ IndexedDB ============
  function initDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('GintamaAnswersDB', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('episodes')) {
          const store = db.createObjectStore('episodes', { keyPath: 'id', autoIncrement: true });
          store.createIndex('episode', 'ep', { unique: false });
        }
        if (!db.objectStoreNames.contains('history')) {
          db.createObjectStore('history', { keyPath: 'timestamp' });
        }
      };
      req.onsuccess = (e) => {
        db = e.target.result;
        checkAndPopulate(db).then(resolve).catch(reject);
      };
      req.onerror = reject;
    });
  }

  function checkAndPopulate(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('episodes', 'readonly');
      const store = tx.objectStore('episodes');
      const countReq = store.count();
      countReq.onsuccess = () => {
        if (countReq.result === 0) {
          populateDB(db).then(resolve).catch(reject);
        } else {
          resolve();
        }
      };
      countReq.onerror = reject;
    });
  }

  function populateDB(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('episodes', 'readwrite');
      const store = tx.objectStore('episodes');
      EPISODES.forEach(ep => store.add(ep));
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  }

  function getRandomFromDB() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('episodes', 'readonly');
      const store = tx.objectStore('episodes');
      const countReq = store.count();
      countReq.onsuccess = () => {
        const total = countReq.result;
        let idx;
        do {
          idx = Math.floor(Math.random() * total);
        } while (idx === lastViewedIndex && total > 1);
        lastViewedIndex = idx;
        const getReq = store.get(idx + 1); // autoIncrement starts at 1
        getReq.onsuccess = () => resolve(getReq.result);
        getReq.onerror = reject;
      };
      countReq.onerror = reject;
    });
  }

  function saveToHistory(ep) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('history', 'readwrite');
      const store = tx.objectStore('history');
      store.add({ timestamp: Date.now(), ep: ep.ep, ja: ep.ja, cn: ep.cn });
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  }

  // ============ Text rendering with brush effect ============
  function drawTitle(ep) {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.filter = 'url(#brushFilter)';

    const jaText = ep.ja;
    const baseFontSize = Math.min(W * 0.12, H * 0.11, 68);
    const lineHeight = baseFontSize * 1.5;
    const globalScale = 1 + (Math.random() - 0.5) * 0.2;
    const maxLineWidth = W * 0.88;

    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';

    // 先为每个字符随机生成字号并测量宽度
    const chars = [];
    for (const ch of jaText) {
      const charScale = 1 + (Math.random() - 0.5) * 0.2;
      const fs = baseFontSize * globalScale * charScale;
      ctx.font = `900 ${fs}px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "MS PGothic", sans-serif`;
      const w = ctx.measureText(ch).width;
      chars.push({ ch, fs, w });
    }

    // 基于实际像素宽度分行（优先在标点处断行）
    const breaks = new Set(['!', '?', '。', '、', '・', '(', ')', '（', '）', '&', ' ', '/', '\\', '!', '？', '！']);
    const lines = [];
    let line = [];
    let lineW = 0;
    let lineChars = 0;

    for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      const wouldW = lineW + c.w;
      if (wouldW > maxLineWidth && line.length > 0) {
        // 需要换行：尝试在标点处断开
        let breakAt = line.length; // 默认当前字断
        for (let j = line.length - 1; j >= 0; j--) {
          if (breaks.has(line[j].ch)) {
            breakAt = j + 1;
            break;
          }
        }
        lines.push(line.splice(0, breakAt));
        // 把 splice 剩余的宽度重算
        lineW = 0;
        for (const r of line) lineW += r.w;
        // 继续尝试放入当前字
        if (lineW + c.w <= maxLineWidth) {
          line.push(c);
          lineW += c.w;
        } else {
          lines.push([...line]);
          line = [c];
          lineW = c.w;
        }
      } else {
        line.push(c);
        lineW = wouldW;
      }
    }
    if (line.length > 0) lines.push(line);

    // 根据行数动态缩小字号，避免行太多溢出
    const maxLines = Math.floor((H * 0.72) / (baseFontSize * globalScale * 1.5));
    let finalScale = 1;
    if (lines.length > maxLines && maxLines > 0) {
      finalScale = maxLines / lines.length;
    }

    const finalLineHeight = baseFontSize * globalScale * finalScale * 1.5;
    const totalTextHeight = lines.length * finalLineHeight;
    const startY = (H - totalTextHeight) / 2 + finalLineHeight / 2 - H * 0.04;

    lines.forEach((lineChars, i) => {
      const y = startY + i * finalLineHeight;
      let totalW = lineChars.reduce((s, c) => s + c.w * finalScale, 0);
      let x = (W - totalW) / 2;
      for (const c of lineChars) {
        const scaledFs = c.fs * finalScale;
        const scaledW = c.w * finalScale;
        ctx.font = `900 ${scaledFs}px "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "MS PGothic", sans-serif`;
        const cy = y + (Math.random() - 0.5) * baseFontSize * 0.04;
        ctx.globalAlpha = 0.12;
        ctx.fillText(c.ch, x + scaledW / 2 + 1.5, cy + 1.5);
        ctx.globalAlpha = 1;
        ctx.fillText(c.ch, x + scaledW / 2, cy);
        x += scaledW;
      }
    });

    ctx.restore();
  }

  function showNewTitle() {
    if (isAnimating) return;
    isAnimating = true;

    const cnEl = document.getElementById('cnText');
    const epEl = document.getElementById('epInfo');
    const hintEl = document.getElementById('hint');

    // Fade out current
    cnEl.classList.remove('fade-in');
    cnEl.classList.add('fade-out');
    epEl.classList.add('fade-out');

    if (hintEl) hintEl.style.display = 'none';

    setTimeout(() => {
      getRandomFromDB().then(ep => {
        currentEp = ep;
        drawTitle(ep);

        cnEl.textContent = ep.cn;
        cnEl.classList.remove('fade-out');
        cnEl.classList.add('fade-in');

        epEl.textContent = `EP.${ep.ep}`;
        epEl.classList.remove('fade-out');
        epEl.classList.add('fade-in');

        saveToHistory(ep);
        isAnimating = false;
      });
    }, 400);
  }

  // ============ Init ============
  async function init() {
    await document.fonts.ready;
    resizeCanvas();
    await initDB();
    showNewTitle();
  }

  window.addEventListener('resize', resizeCanvas);
  document.body.addEventListener('click', showNewTitle);
  document.body.addEventListener('touchstart', (e) => {
    e.preventDefault();
    showNewTitle();
  }, { passive: false });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      showNewTitle();
    }
  });

  init().catch(err => {
    console.error('Init failed:', err);
    // Fallback: use embedded data directly
    const ep = EPISODES[Math.floor(Math.random() * EPISODES.length)];
    currentEp = ep;
    drawTitle(ep);
    document.getElementById('cnText').textContent = ep.cn;
    document.getElementById('cnText').classList.remove('fade-out');
    document.getElementById('cnText').classList.add('fade-in');
  });
})();
</script>
</body>
</html>
